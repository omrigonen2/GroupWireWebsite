services:
  - type: web
    runtime: static
    name: groupwire-website
    buildCommand: npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    previews:
      generation: automatic
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://bo.groupwire.cloud; form-action 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /data/*
        name: Cache-Control
        value: public, max-age=300
      - path: /_astro/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
